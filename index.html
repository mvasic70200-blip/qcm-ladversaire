<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>QCM L'Adversaire</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }\n        h1 { color: #333; }\n        .question { margin: 20px 0; }\n        .answer { margin: 10px 0; }\n        #score { margin-top: 20px; font-size: 20px; }\n        #timer { font-size: 18px; color: red; }\n    </style>\n</head>\n<body>\n    <h1>QCM L'Adversaire</h1>\n    <form id="quizForm">\n        <label for="name">Name:</label>\n        <input type="text" id="name" required>\n        <br>\n        <label for="firstname">First Name:</label>\n        <input type="text" id="firstname" required>\n        <br><br>\n        <div id="quiz"></div>\n        <div id="timer"></div>\n        <button type="submit">Submit</button>\n    </form>\n    <div id="score"></div>\n    <script>\n        const questions = [\n            { question: "Question 1 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 0 },\n            { question: "Question 2 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 1 },\n            { question: "Question 3 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 2 },\n            { question: "Question 4 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 3 },\n            { question: "Question 5 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 0 },\n            { question: "Question 6 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 1 },\n            { question: "Question 7 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 2 },\n            { question: "Question 8 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 3 },\n            { question: "Question 9 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 0 },\n            { question: "Question 10 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 1 },\n            { question: "Question 11 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 2 },\n            { question: "Question 12 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 3 },\n            { question: "Question 13 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 0 },\n            { question: "Question 14 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 1 },\n            { question: "Question 15 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 2 },\n            { question: "Question 16 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 3 },\n            { question: "Question 17 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 0 },\n            { question: "Question 18 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 1 },\n            { question: "Question 19 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 2 },\n            { question: "Question 20 about L'Adversaire", answers: ["Answer 1", "Answer 2", "Answer 3", "Answer 4"], correct: 3 }\n        ];\n\n        let currentQuestionIndex = 0;\n        let score = 0;\n\n        // Shuffle questions array\n        questions.sort(() => Math.random() - 0.5);\n\n        function showQuestion() {\n            if (currentQuestionIndex < questions.length) {\n                const questionElement = document.createElement('div');\n                questionElement.className = 'question';\n                questionElement.innerHTML = `<h2>${questions[currentQuestionIndex].question}</h2>`;\n\n                questions[currentQuestionIndex].answers.forEach((answer, index) => {\n                    const answerElement = document.createElement('div');\n                    answerElement.className = 'answer';\n                    answerElement.innerHTML = `<input type='radio' name='answer' value='${index}'> ${answer}`;\n                    questionElement.appendChild(answerElement);\n                });\n                document.getElementById('quiz').appendChild(questionElement);\n                startTimer();\n            } else {\n                displayScore();\n            }\n        }\n\n        function startTimer() {\n            let timeLeft = 30;\n            const timerElement = document.getElementById('timer');\n            timerElement.innerHTML = `Time left: ${timeLeft} seconds`;\n            const timer = setInterval(() => {\n                timeLeft--;\n                timerElement.innerHTML = `Time left: ${timeLeft} seconds`;\n                if (timeLeft <= 0) {\n                    clearInterval(timer);\n                    checkAnswer(-1); // Auto-submit if time is up\n                }\n            }, 1000);\n        }\n\n        function checkAnswer(selected) {\n            if (selected === questions[currentQuestionIndex].correct) {\n                score++;\n            }\n            currentQuestionIndex++;\n            document.getElementById('quiz').innerHTML = '';\n            showQuestion();\n        }\n\n        function displayScore() {\n            const name = document.getElementById('name').value;\n            const firstname = document.getElementById('firstname').value;\n            const finalScore = (score / questions.length) * 100;\n            document.getElementById('score').innerHTML = `Final Score: ${finalScore}%`;\n            submitToGoogleForm(name, firstname, finalScore);\n        }\n\n        function submitToGoogleForm(name, firstname, score) {\n            const url = 'https://docs.google.com/forms/d/e/1FAIpQLSeTMX2uFdKiwu-o_vT0T38mWJCrfVDIrGfP7RS60YsfnHYzcQ/formResponse';\n            const data = new URLSearchParams();\n            data.append('entry.1234567890', name);\n            data.append('entry.1234567891', firstname);\n            data.append('entry.1234567892', score);\n\n            fetch(url, {\n                method: 'POST',\n                body: data\n            }).then((response) => {\n                if (response.ok) {\n                    console.log('Submission successful');\n                } else {\n                    console.log('Submission failed');\n                }\n            }).catch(error => {\n                console.error('Error submitting:', error);\n            });\n        }\n\n        document.getElementById('quizForm').onsubmit = function (event) {\n            event.preventDefault();\n            const selectedAnswer = document.querySelector('input[name="answer"]:checked');\n            checkAnswer(selectedAnswer ? Number(selectedAnswer.value) : -1);\n        };\n\n        showQuestion();\n    </script>\n</body>\n</html>
